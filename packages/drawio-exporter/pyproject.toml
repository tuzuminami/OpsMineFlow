[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "opsmineflow-drawio-exporter"
version = "0.1.0"
description = "draw.io mxfile XML exporter for OpsMineFlow process maps"
readme = "../../README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }

[tool.setuptools.packages.find]
where = ["src"]

